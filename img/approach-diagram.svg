  <rect x="90" y="110" width="58" height="10" rx="5" fill="#D6A24A"/>
  <rect x="90" y="129" width="78" height="8" rx="4" fill="#D7E4EE"/>
  <rect x="403" y="110" width="58" height="10" rx="5" fill="#0A4C74"/>
  <rect x="403" y="129" width="78" height="8" rx="4" fill="#D7E4EE"/>
  <rect x="235" y="290" width="90" height="10" rx="5" fill="#0A4C74"/>
