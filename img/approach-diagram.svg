    <circle cx="280" cy="308" r="28" fill="url(#ring)" opacity="0.12"/>
    <circle cx="280" cy="308" r="18" fill="url(#ring)"/>
    <path d="M272 308H288" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
    <path d="M280 300V316" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round"/>
